<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <title>Yanverse</title>
    <style>
        /* 全局样式 */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fff;
            color: #333;
        }

        /* 标题居中 */
        .header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 1px solid #eee;
        }

        .header h1 {
            margin: 0;
            font-size: 28px;
        }

        /* 时间模块容器 */
.time-box {
    width: 260px;
    margin: 20px auto;
    text-align: center;
}

.time {
    font-size: 32px;
    font-weight: bold;
}

.date {
    font-size: 14px;
    color: #666;
}

        /* 友情链接 */
        .links {
            text-align: center;
            margin: 20px 0;
        }

        .links ul {
            list-style: disc;
            padding-left: 20px;
            display: inline-block; /* 让列表居中 */
        }

        .links li {
            margin: 5px 0;
        }

        .links a {
            color: #0066cc;
            text-decoration: none;
        }

        .links a:hover {
            text-decoration: underline;
        }

        /* 底部链接 */
        .footer-links {
            text-align: center;
            margin: 20px 0;
        }

        .footer-links a {
            color: #0066cc;
            text-decoration: none;
            margin: 0 5px;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        /* 页脚版权 */
        footer {
            text-align: center;
            padding: 10px 0;
            color: #999;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <!-- 标题 -->
    <header class="header">
        <h1>Welcome to Yanverse</h1>
    </header>

    <!-- 时间模块 -->
 <div class="time-box">
    <div id="time">--:--:--</div>
    <div id="date">----年--月--日 星期-</div>
</div>

    <!-- 友情链接 -->
    <section class="links">
        <h3>友情链接</h3>
        <ul>
            <li><a href="https://yuanbao.tencent.com">元宝</a></li>
            <li><a href="color">颜色调配小游戏</a></li>
            <li><a href="https://test.page.roooooyan.work">Test</a></li>
            <li><a href="search">Search</a></li>
        </ul>
    </section>

    <!-- 底部功能链接 -->
    <div class="footer-links">
        <a href="info.html">访问信息</a>
        <a href="feedback.html">意见反馈</a>
    </div>

    <!-- 页脚版权 -->
    <footer>
        &copy; 2013 - 2026 Yanverse
    </footer>

    <!-- 时间更新脚本 -->
    <script>
document.addEventListener("DOMContentLoaded", function () {

    const timeEl = document.getElementById("time");
    const dateEl = document.getElementById("date");

    // 防御性判断（非常重要）
    if (!timeEl || !dateEl) return;

    function pad(n) {
        return n.toString().padStart(2, "0");
    }

    function updateTime() {
        const now = new Date();

        const timeStr =
            pad(now.getHours()) + ":" +
            pad(now.getMinutes()) + ":" +
            pad(now.getSeconds());

        const weekMap = ["日","一","二","三","四","五","六"];
        const dateStr =
            now.getFullYear() + "年" +
            (now.getMonth() + 1) + "月" +
            now.getDate() + "日 星期" +
            weekMap[now.getDay()];

        timeEl.textContent = timeStr;
        dateEl.textContent = dateStr;
    }

    updateTime();
    setInterval(updateTime, 1000);
});
</script>
</body>
</html>
