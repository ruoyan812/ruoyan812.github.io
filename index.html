.time-box {
    width: 260px;
    padding: 0;
    margin: 0;   /* 靠左 + 顶部间距 */
    background: #ffffff;    /* 白底 */
    border-radius: 0;       /* 无圆角 */
    text-align: left;
    font-family: Arial, sans-serif;
    line-height: 1.8;
}

.time {
    font-size: 32px;
    font-weight: bold;
    color: #222;
}

.date {
    font-size: 14px;
    color: #666;
}
.container {
    width: 320px;
    margin: 0; /* 靠左 */
    font-family: Arial, sans-serif;
}

textarea {
    width: 100%;
    height: 100px;
    padding: 0;

    margin-top: 10px;

<div class="box">
    <h2>你的访问信息</h2>
    <p id="ip">IP：正在获取...</p>
    <p id="version">IP版本：正在获取...</p>
    <p id="country">国家：正在获取...</p>
</div>
<script>
fetch('https://ipapi.co/json/')
.then(res => res.json())
.then(data => {
    document.getElementById('ip').innerText = 'IP：' + data.ip;
    document.getElementById('version').innerText = 'IP版本：' + data.version;
    document.getElementById('country').innerText = '国家：' + data.country_name;
})
.catch(() => {
    document.getElementById('ip').innerText = 'IP：获取失败';
    document.getElementById('version').innerText = 'IP版本：获取失败';
    document.getElementById('country').innerText = '国家：获取失败';
});
</script>
<div class="time-box">
    <div id="time" class="time">--:--:--</div>
    <div id="date" class="date">----年--月--日 星期-</div>
</div>
<script>
function updateTime() {
    const now = new Date();

    const timeStr = now.toLocaleTimeString('zh-CN', {
        hour12: false,
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
    });

    const dateStr = now.toLocaleDateString('zh-CN', {
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        weekday: 'long'
    });

    document.getElementById('time').textContent = timeStr;
    document.getElementById('date').textContent = dateStr;
}

updateTime();
setInterval(updateTime, 1000);
</script>

    <div class="container">
    <textarea id="message" placeholder="请输入要发送的内容"></textarea>
    <br>
    <button onclick="sendMail()">发送</button>
    <p id="status"></p>
</div>

<!-- EmailJS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<script>
// ✅ 初始化 EmailJS（换成你自己的 Public Key）
emailjs.init("O0c6Hvi0DVvWYqvM_");

function sendMail() {
    const message = document.getElementById('message').value;
    const status = document.getElementById('status');

    if (!message.trim()) {
        status.innerText = "⚠️ 内容不能为空";
        return;
    }

    // ✅ 替换为你的 Service ID 和 Template ID
    emailjs.send(
        "service_okc5com",
        "template_3pk0hiq",
        {
            content: message
        }
    ).then(() => {
        status.innerText = "✅ 发送成功";
        document.getElementById('message').value = "";
    }).catch(() => {
        status.innerText = "❌ 发送失败";
    });
}
</script>
