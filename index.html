<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Yanverse</title>
    <p><strong>Welcome to Yanverse !</strong></p>
    <style>
.time-box {
    width: 260px;
    padding: 15px 20px;
    margin: 40px 0 0 40px;   /* 靠左 + 顶部间距 */
    background: #ffffff;    /* 白底 */
    border-radius: 0;       /* 无圆角 */
    text-align: left;
    font-family: Arial, sans-serif;
    line-height: 1.8;
}

.time {
    font-size: 32px;
    font-weight: bold;
    color: #222;
}

.date {
    font-size: 14px;
    color: #666;
}
</style>
  </head>
<div class="box">
    <h2>你的访问信息</h2>
    <p id="ip">IP：正在获取...</p>
    <p id="version">IP版本：正在获取...</p>
    <p id="country">国家：正在获取...</p>
</div>
<script>
fetch('https://ipapi.co/json/')
.then(res => res.json())
.then(data => {
    document.getElementById('ip').innerText = 'IP：' + data.ip;
    document.getElementById('version').innerText = 'IP版本：' + data.version;
    document.getElementById('country').innerText = '国家：' + data.country_name;
})
.catch(() => {
    document.getElementById('ip').innerText = 'IP：获取失败';
    document.getElementById('version').innerText = 'IP版本：获取失败';
    document.getElementById('country').innerText = '国家：获取失败';
});
</script>
<div class="time-box">
    <div id="time" class="time">--:--:--</div>
    <div id="date" class="date">----年--月--日 星期-</div>
</div>
<script>
function updateTime() {
    const now = new Date();

    const timeStr = now.toLocaleTimeString('zh-CN', {
        hour12: false,
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
    });

    const dateStr = now.toLocaleDateString('zh-CN', {
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        weekday: 'long'
    });

    document.getElementById('time').textContent = timeStr;
    document.getElementById('date').textContent = dateStr;
}

updateTime();
setInterval(updateTime, 1000);
</script>
<body>

  </body>

</html>
