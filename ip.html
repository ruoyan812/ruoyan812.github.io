<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>查询访问者 IP 与国家</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
        }
        .box {
            display: inline-block;
            padding: 30px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>你的访问信息</h2>
    <p id="ip">IP：正在获取...</p>
    <p id="country">国家：正在获取...</p>
</div>

<script>
fetch('https://ipapi.co/json/')
.then(res => res.json())
.then(data => {
    document.getElementById('ip').innerText = 'IP：' + data.ip;
    document.getElementById('country').innerText = '国家：' + data.country_name;
})
.catch(() => {
    document.getElementById('ip').innerText = 'IP：获取失败';
    document.getElementById('country').innerText = '国家：获取失败';
});
</script>

</body>
</html>
