<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Yanverse</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 120px;
        }
        input {
            width: 500px;
            height: 44px;
            font-size: 18px;
            padding-left: 15px;
            border: 1px solid #dfe1e5;
            border-radius: 24px;
            outline: none;
        }
        button {
            margin-top: 20px;
            height: 44px;
            font-size: 16px;
            padding: 0 24px;
            border: none;
            background: #4d90fe;
            color: white;
            border-radius: 24px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Yanverse Search</h1>

    <form action="result.html" method="get">
        <input type="text" name="q" placeholder="输入搜索内容" required>
        <br><br>
        <button type="submit">搜索</button>
    </form>
<h4>
  <strong>© 2013 - 2026 Yanverse</strong>
</h4>
</body>
</html>
